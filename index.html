<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptbok</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page">
        <section class="intro">
            <h1>Välkommen till min receptbok!</h1>
            <p>Här kan du lägga till, redigera och ta bort recept</p>
        </section>
        <div class="layout">
            <section class="form-section">
                <h2>lägg till recept</h2>

                <form id="recipe-form">
                    <div class="form-group">
                        <label for="title">Receptnamn</label>
                        <input type="text" id="title" name="title" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Kategori</label>
                        <input type="text" id="category" name="category" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Beskrivning</label>
                        <textarea id="description" name="description" rows="4" required></textarea>
                    </div>

                    <button type="submit">Spara recept</button>
                </form>
            </section>

            <section class="recipes-section">
                <h2>Mina Recept</h2>
                <div id="recipe-list" class="recipe-list"></div>
            </section>
        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
